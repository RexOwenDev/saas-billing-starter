name: Bug Report
description: Something is broken or behaving unexpectedly
title: "[Bug]: "
labels: ["bug", "needs-triage"]
assignees:
  - RexOwenDev

body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to report a bug. Please fill in as much detail as possible — it helps us reproduce and fix the issue faster.

  - type: textarea
    id: description
    attributes:
      label: Description
      description: A clear description of what the bug is.
      placeholder: When I call reportUsage(), the idempotency check is not working and usage is being double-counted…
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: Step-by-step instructions to reproduce the behaviour.
      placeholder: |
        1. Set up a test subscription
        2. Call reportUsage() twice with the same idempotencyKey
        3. Check usage_records table
        4. See duplicate rows
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behaviour
      description: What you expected to happen.
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual behaviour
      description: What actually happened. Include error messages and stack traces if available.
    validations:
      required: true

  - type: input
    id: node-version
    attributes:
      label: Node.js version
      placeholder: "20.11.0"
    validations:
      required: true

  - type: input
    id: npm-version
    attributes:
      label: npm version
      placeholder: "10.2.4"

  - type: dropdown
    id: environment
    attributes:
      label: Environment
      options:
        - Local development
        - Vercel preview
        - Vercel production
        - Other (describe in additional context)
    validations:
      required: true

  - type: textarea
    id: context
    attributes:
      label: Additional context
      description: Any other information — screenshots, logs, related issues.
